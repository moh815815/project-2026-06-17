<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تدفق PRO — منصة الأتمتة العربية</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0a0c10;
  --bg-surface: #0f1217;
  --bg-card: #141820;
  --bg-hover: #1a2030;
  --bg-active: #1e2638;
  --border: #1e2638;
  --border-light: #252d40;
  --accent: #3b82f6;
  --accent-glow: #3b82f630;
  --accent-2: #8b5cf6;
  --accent-3: #06b6d4;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text-primary: #e8eaf0;
  --text-secondary: #8892a4;
  --text-muted: #4a5568;
  --node-w: 220px;
  --node-h: 70px;
  --canvas-bg: #080a0e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'IBM Plex Sans Arabic', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── TOP BAR ─── */
#topbar {
  height: 52px;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.5px;
  min-width: 100px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.flow-name-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 14px;
  width: 220px;
  outline: none;
  transition: border-color .2s;
}
.flow-name-input:focus { border-color: var(--accent); }

.topbar-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

.tb-btn {
  height: 34px;
  padding: 0 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  transition: all .15s;
  white-space: nowrap;
}
.tb-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-light); }
.tb-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.tb-btn.primary:hover { background: #2563eb; }
.tb-btn.success { background: var(--success); border-color: var(--success); color: #fff; font-weight: 600; }
.tb-btn.success:hover { background: #059669; }
.tb-btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }
.tb-btn.danger:hover { background: var(--danger)22; }

.run-status {
  margin-right: auto;
  display: flex; align-items: center; gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
}
.run-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-muted);
  transition: background .3s;
}
.run-dot.running { background: var(--warning); animation: pulse 1s infinite; }
.run-dot.done { background: var(--success); }
.run-dot.error { background: var(--danger); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ─── MAIN LAYOUT ─── */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ─── LEFT SIDEBAR — NODE PANEL ─── */
#sidebar {
  width: 260px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
}
.sidebar-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }

.search-box {
  margin: 10px 16px;
  position: relative;
}
.search-box input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 7px 12px 7px 32px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box .s-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; }

#node-list { flex: 1; overflow-y: auto; padding: 8px; }
#node-list::-webkit-scrollbar { width: 4px; }
#node-list::-webkit-scrollbar-track { background: transparent; }
#node-list::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

.node-category { margin-bottom: 4px; }
.cat-header {
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: .6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  border-radius: 6px;
  transition: background .15s;
  user-select: none;
}
.cat-header:hover { background: var(--bg-hover); }
.cat-arrow { transition: transform .2s; font-size: 10px; }
.cat-header.collapsed .cat-arrow { transform: rotate(-90deg); }

.cat-items { overflow: hidden; }
.cat-items.hidden { display: none; }

.node-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: grab;
  transition: background .15s;
  user-select: none;
  margin-bottom: 2px;
}
.node-item:hover { background: var(--bg-hover); }
.node-item:active { cursor: grabbing; }

.node-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.node-item-info { flex: 1; min-width: 0; }
.node-item-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.node-item-desc { font-size: 11px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ─── CANVAS ─── */
#canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--canvas-bg);
  background-image:
    radial-gradient(circle at 1px 1px, #1e2638 1px, transparent 0);
  background-size: 28px 28px;
}

#canvas {
  position: absolute;
  width: 4000px;
  height: 3000px;
  transform-origin: 0 0;
}

/* ─── SVG CONNECTIONS ─── */
#svg-layer {
  position: absolute;
  top: 0; left: 0;
  width: 4000px; height: 3000px;
  pointer-events: none;
  overflow: visible;
}

.connection-path {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  opacity: .7;
  transition: opacity .2s;
}
.connection-path:hover { opacity: 1; }
.connection-path.selected { stroke: var(--accent-2); opacity: 1; }
.connection-path.animated {
  stroke-dasharray: 8 4;
  animation: dash 1s linear infinite;
}
@keyframes dash { to { stroke-dashoffset: -12; } }

.conn-arrow { fill: var(--accent); }

/* ─── NODES ─── */
.wf-node {
  position: absolute;
  width: var(--node-w);
  background: var(--bg-card);
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  cursor: grab;
  user-select: none;
  transition: box-shadow .2s, border-color .2s;
  z-index: 10;
}
.wf-node:hover {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 24px #0006;
}
.wf-node.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow), 0 8px 32px #0008;
}
.wf-node:active { cursor: grabbing; }
.wf-node.running {
  border-color: var(--warning);
  box-shadow: 0 0 0 3px #f59e0b30;
}
.wf-node.success-run {
  border-color: var(--success);
  box-shadow: 0 0 0 3px #10b98130;
}
.wf-node.error-run {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px #ef444430;
}

.node-header {
  padding: 10px 12px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.node-header-icon {
  width: 30px; height: 30px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.node-header-text { flex: 1; min-width: 0; }
.node-title { font-size: 13px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.node-type { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

.node-body { padding: 8px 12px 10px; }
.node-status { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
.node-status .ns-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
.node-status.ok .ns-dot { background: var(--success); }
.node-status.err .ns-dot { background: var(--danger); }
.node-status.run .ns-dot { background: var(--warning); animation: pulse 1s infinite; }

/* ports */
.port {
  position: absolute;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--bg-card);
  border: 2px solid var(--border-light);
  cursor: crosshair;
  transition: all .15s;
  z-index: 20;
}
.port:hover {
  background: var(--accent);
  border-color: var(--accent);
  transform: scale(1.4);
}
.port.input-port { right: -6px; top: 50%; transform: translateY(-50%); }
.port.output-port { left: -6px; top: 50%; transform: translateY(-50%); }
.port.input-port:hover { transform: translateY(-50%) scale(1.4); }
.port.output-port:hover { transform: translateY(-50%) scale(1.4); }
.port.connected { border-color: var(--accent); background: var(--accent); }

.node-actions {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 4px;
  z-index: 30;
}
.wf-node:hover .node-actions { display: flex; }
.na-btn {
  width: 22px; height: 22px;
  border-radius: 5px;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all .15s;
}
.na-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.na-btn.del:hover { background: var(--danger); border-color: var(--danger); }

/* ─── MINIMAP ─── */
#minimap {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 180px;
  height: 110px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  z-index: 50;
}
#minimap canvas { display: block; }
.minimap-label {
  position: absolute;
  bottom: 4px;
  right: 6px;
  font-size: 9px;
  color: var(--text-muted);
  pointer-events: none;
}

/* ─── ZOOM CONTROLS ─── */
#zoom-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 50;
}
.zoom-btn {
  width: 34px; height: 34px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.zoom-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.zoom-label {
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}

/* ─── RIGHT PANEL — PROPERTIES ─── */
#props-panel {
  width: 300px;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 60;
}
#props-panel.open { transform: translateX(0); }

.panel-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.panel-title { font-size: 14px; font-weight: 600; }
.panel-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all .15s;
}
.panel-close:hover { background: var(--danger)22; color: var(--danger); border-color: var(--danger); }

.panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

.prop-group { margin-bottom: 20px; }
.prop-group-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

.prop-field { margin-bottom: 12px; }
.prop-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; display: block; }
.prop-input, .prop-select, .prop-textarea {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 8px 10px;
  border-radius: 8px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  transition: border-color .2s;
}
.prop-input:focus, .prop-select:focus, .prop-textarea:focus { border-color: var(--accent); }
.prop-textarea { resize: vertical; min-height: 80px; }
.prop-select { appearance: none; cursor: pointer; }

.prop-row { display: flex; gap: 8px; }
.prop-row .prop-field { flex: 1; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
}
.toggle-label { font-size: 13px; color: var(--text-primary); }
.toggle {
  width: 38px; height: 22px;
  background: var(--border);
  border-radius: 11px;
  position: relative;
  cursor: pointer;
  transition: background .2s;
  flex-shrink: 0;
}
.toggle.on { background: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  top: 3px; right: 3px;
  transition: transform .2s;
}
.toggle.on::after { transform: translateX(-16px); }

.code-editor {
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #a5d6ff;
  min-height: 120px;
  resize: vertical;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
.code-editor:focus { border-color: var(--accent); }

.test-btn {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #fff;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  margin-top: 4px;
}
.test-btn:hover { background: #2563eb; }
.test-btn.secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); }
.test-btn.secondary:hover { background: var(--bg-hover); color: var(--text-primary); }

/* ─── LOGS PANEL ─── */
#logs-panel {
  height: 200px;
  background: var(--bg-surface);
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transform: translateY(100%);
  transition: transform .25s;
}
#logs-panel.open { transform: translateY(0); }

.logs-header {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logs-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }
.log-count { background: var(--accent); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; }

.logs-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}
.logs-body::-webkit-scrollbar { width: 4px; }
.logs-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

.log-entry {
  display: flex;
  gap: 10px;
  padding: 3px 0;
  border-bottom: 1px solid var(--border)44;
  align-items: flex-start;
}
.log-time { color: var(--text-muted); flex-shrink: 0; font-size: 11px; }
.log-level { font-size: 11px; padding: 0 5px; border-radius: 3px; flex-shrink: 0; }
.log-level.info { background: #3b82f622; color: var(--accent); }
.log-level.success { background: #10b98122; color: var(--success); }
.log-level.error { background: #ef444422; color: var(--danger); }
.log-level.warn { background: #f59e0b22; color: var(--warning); }
.log-msg { color: var(--text-primary); flex: 1; font-size: 11px; line-height: 1.5; }

/* ─── CONTEXT MENU ─── */
#ctx-menu {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 10px;
  padding: 6px;
  z-index: 1000;
  min-width: 180px;
  box-shadow: 0 8px 32px #0008;
  display: none;
}
.ctx-item {
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-primary);
  transition: background .1s;
}
.ctx-item:hover { background: var(--bg-hover); }
.ctx-item.danger { color: var(--danger); }
.ctx-item.danger:hover { background: var(--danger)22; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ─── TOAST ─── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 13px;
  color: var(--text-primary);
  z-index: 2000;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 8px 24px #0006;
  pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.t-success { border-color: var(--success); }
#toast.t-error { border-color: var(--danger); }

/* ─── MODAL ─── */
#modal-overlay {
  position: fixed; inset: 0;
  background: #00000088;
  backdrop-filter: blur(4px);
  z-index: 500;
  display: none;
  align-items: center;
  justify-content: center;
}
#modal-overlay.show { display: flex; }
.modal-box {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  width: 480px;
  max-width: 95vw;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 64px #000a;
}
.modal-head {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* ─── FLOWS SIDEBAR ─── */
#flows-sidebar {
  width: 220px;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width .25s;
}
#flows-sidebar.collapsed { width: 0; border: none; }

.fs-header {
  padding: 14px 14px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.fs-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }

.flow-list { flex: 1; overflow-y: auto; padding: 8px; }
.flow-item {
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: background .15s;
  margin-bottom: 3px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.flow-item:hover { background: var(--bg-hover); }

// ─── NODE LIST (SIDEBAR) ───────────────────────────
function renderNodeList(filter = '') {
  const cats = {};
  Object.entries(NODE_DEFS).forEach(([key, def]) => {
    if (filter && !def.name.includes(filter) && !def.desc.includes(filter) && !def.cat.includes(filter)) return;
    if (!cats[def.cat]) cats[def.cat] = [];
    cats[def.cat].push({ key, ...def });
  });

  const container = document.getElementById('node-list');
  container.innerHTML = '';
  Object.entries(cats).forEach(([cat, nodes]) => {
    const catEl = document.createElement('div');
    catEl.className = 'node-category';
    catEl.innerHTML = `
      <div class="cat-header" onclick="toggleCat(this)">
        <span>${cat}</span><span class="cat-arrow">▾</span>
      </div>
      <div class="cat-items">
        ${nodes.map(n => `
          <div class="node-item" draggable="true"
               data-type="${n.key}"
               ondragstart="startSidebarDrag(event,'${n.key}')"
               onclick="addNodeAtCenter('${n.key}')">
            <div class="node-icon" style="background:${n.colorBg};color:${n.color}">${n.icon}</div>
            <div class="node-item-info">
              <div class="node-item-name">${n.name}</div>
              <div class="node-item-desc">${n.desc}</div>
            </div>
          </div>`).join('')}
      </div>`;
    container.appendChild(catEl);
  });
}

function toggleCat(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('hidden');
}

function filterNodes(val) { renderNodeList(val); }

// ─── FLOW LIST ─────────────────────────────────────
function renderFlowList() {
  const list = document.getElementById('flow-list');
  list.innerHTML = state.flows.map(f => `
    <div class="flow-item ${state.currentFlow === f.id ? 'active' : ''}" onclick="switchFlow('${f.id}')">
      <span class="flow-item-icon">⚡</span>
      <div class="flow-item-info">
        <div class="flow-item-name">${f.name}</div>
        <div class="flow-item-meta">${Object.keys(f.nodes).length} عقدة</div>
      </div>
      <span class="flow-badge ${f.active ? 'active' : 'paused'}">${f.active ? 'نشط' : 'متوقف'}</span>
    </div>
  `).join('');
}

function switchFlow(id) {
  // Save current
  if (state.currentFlow) {
    const cur = state.flows.find(f => f.id === state.currentFlow);
    if (cur) { cur.nodes = state.nodes; cur.connections = state.connections; }
  }
  state.currentFlow = id;
  const flow = state.flows.find(f => f.id === id);
  if (flow) {
    state.nodes = flow.nodes;
    state.connections = flow.connections;
    document.getElementById('flow-name').value = flow.name;
  }
  renderAll();
  updateEmptyState();
  renderFlowList();
}

function newFlow() {
  const id = 'f' + Date.now();
  state.flows.push({ id, name: 'أتمتة جديدة ' + (state.flows.length + 1), nodes: {}, connections: [], active: false });
  switchFlow(id);
  showFlowsSidebar();
  addLog('info', 'تم إنشاء أتمتة جديدة');
  showToast('تم إنشاء أتمتة جديدة ✨', 'success');
}

function showFlowsSidebar() {
  const s = document.getElementById('flows-sidebar');
  s.classList.remove('collapsed');
  renderFlowList();
}

// ─── NODE MANAGEMENT ──────────────────────────────
function addNode(type, x, y) {
  const id = 'n' + (state.nodeIdCounter++);
  const def = NODE_DEFS[type];
  const defaults = {};
  (def.fields || []).forEach(f => { defaults[f.key] = f.default; });
  state.nodes[id] = { id, type, x, y, data: defaults, label: def.name };
  return id;
}

function addNodeAtCenter(type) {
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const cx = (r.width / 2 - state.canvas.x) / state.canvas.scale;
  const cy = (r.height / 2 - state.canvas.y) / state.canvas.scale;
  const id = addNode(type, cx - 110, cy - 35);
  renderAll();
  updateEmptyState();
  selectNode(id);
  showProps(id);
  addLog('info', `تمت إضافة عقدة "${NODE_DEFS[type].name}"`);
  showToast(`تمت إضافة ${NODE_DEFS[type].name}`, 'success');
}

function deleteNode(id) {
  state.connections = state.connections.filter(c => c.from !== id && c.to !== id);
  delete state.nodes[id];
  state.selectedNodes.delete(id);
  closeProps();
  renderAll();
  updateEmptyState();
  addLog('warn', 'تم حذف العقدة');
}

function duplicateNode(id) {
  const node = state.nodes[id];
  if (!node) return;
  const newId = addNode(node.type, node.x + 30, node.y + 30);
  state.nodes[newId].data = { ...node.data };
  state.nodes[newId].label = node.label + ' (نسخة)';
  renderAll();
  selectNode(newId);
  addLog('info', `تم نسخ العقدة "${node.label}"`);
}

// ─── RENDER ───────────────────────────────────────
function renderAll() {
  renderNodes();
  renderConnections();
  updateMinimap();
}

function renderNodes() {
  const canvas = document.getElementById('canvas');
  // Remove old nodes
  canvas.querySelectorAll('.wf-node').forEach(el => el.remove());
  // Render
  Object.values(state.nodes).forEach(node => {
    const def = NODE_DEFS[node.type];
    const el = document.createElement('div');
    el.className = 'wf-node' + (state.selectedNodes.has(node.id) ? ' selected' : '');
    el.id = 'node-' + node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';

    // Input ports
    let inputPorts = '';
    for (let i = 0; i < (def.inputs || 0); i++) {
      const top = def.inputs === 1 ? '50%' : `${(i + 1) * 100 / (def.inputs + 1)}%`;
      inputPorts += `<div class="port input-port" style="top:${top};transform:translateY(-50%)"
        data-node="${node.id}" data-dir="input" data-index="${i}"
        onmousedown="startConnect(event,'${node.id}','input',${i})"></div>`;
    }
    // Output ports
    let outputPorts = '';
    const numOut = def.outputs || 0;
    for (let i = 0; i < numOut; i++) {
      const top = numOut === 1 ? '50%' : `${(i + 1) * 100 / (numOut + 1)}%`;
      const label = def.outputLabels ? def.outputLabels[i] : '';
      outputPorts += `<div class="port output-port" style="top:${top};transform:translateY(-50%)"
        title="${label}"
        data-node="${node.id}" data-dir="output" data-index="${i}"
        onmousedown="startConnect(event,'${node.id}','output',${i})"></div>`;
    }

    el.innerHTML = `
      <div class="node-actions">
        <button class="na-btn" onclick="showProps('${node.id}')" title="إعدادات">⚙</button>
        <button class="na-btn" onclick="duplicateNode('${node.id}')" title="نسخ">⧉</button>
        <button class="na-btn del" onclick="deleteNode('${node.id}')" title="حذف">✕</button>
      </div>
      ${inputPorts}
      <div class="node-header" style="border-bottom-color:${def.color}22">
        <div class="node-header-icon" style="background:${def.colorBg};color:${def.color}">${def.icon}</div>
        <div class="node-header-text">
          <div class="node-title">${node.label}</div>
          <div class="node-type" style="color:${def.color}">${def.cat}</div>
        </div>
      </div>
      <div class="node-body">
        <div class="node-status" id="status-${node.id}">
          <div class="ns-dot"></div>
          <span>جاهز</span>
        </div>
      </div>
      ${outputPorts}`;

    el.addEventListener('mousedown', e => { if (!e.target.classList.contains('port') && !e.target.classList.contains('na-btn')) startDragNode(e, node.id); });
    el.addEventListener('click', e => { if (!e.target.classList.contains('port') && !e.target.classList.contains('na-btn')) { selectNode(node.id); e.stopPropagation(); } });
    el.addEventListener('dblclick', () => showProps(node.id));

    canvas.appendChild(el);
  });
  updatePortConnected();
}

function updatePortConnected() {
  document.querySelectorAll('.port').forEach(p => p.classList.remove('connected'));
  state.connections.forEach(c => {
    const fNode = document.getElementById('node-' + c.from);
    const tNode = document.getElementById('node-' + c.to);
    if (fNode) {
      const ports = fNode.querySelectorAll('.output-port');
      if (ports[c.fromPort]) ports[c.fromPort].classList.add('connected');
    }
    if (tNode) {
      const ports = tNode.querySelectorAll('.input-port');
      if (ports[c.toPort]) ports[c.toPort].classList.add('connected');
    }
  });
}

// ─── CONNECTIONS ──────────────────────────────────
function addConnection(fromId, fromPort, toId, toPort) {
  // Avoid duplicate
  const exists = state.connections.find(c => c.from === fromId && c.fromPort === fromPort && c.to === toId && c.toPort === toPort);
  if (!exists) {
    state.connections.push({ id: 'c' + Date.now() + Math.random(), from: fromId, fromPort, to: toId, toPort });
  }
}

function renderConnections() {
  const svg = document.getElementById('svg-layer');
  svg.querySelectorAll('.connection-path, .conn-label').forEach(e => e.remove());

  state.connections.forEach(conn => {
    const fromEl = document.getElementById('node-' + conn.from);
    const toEl = document.getElementById('node-' + conn.to);
    if (!fromEl || !toEl) return;

    const fromPorts = fromEl.querySelectorAll('.output-port');
    const toPorts = toEl.querySelectorAll('.input-port');
    const fp = fromPorts[conn.fromPort];
    const tp = toPorts[conn.toPort];
    if (!fp || !tp) return;

    const fr = fp.getBoundingClientRect();
    const tr = tp.getBoundingClientRect();
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();

    const sx = (fr.left + fr.width / 2 - wrap.left - state.canvas.x) / state.canvas.scale;
    const sy = (fr.top + fr.height / 2 - wrap.top - state.canvas.y) / state.canvas.scale;
    const ex = (tr.left + tr.width / 2 - wrap.left - state.canvas.x) / state.canvas.scale;
    const ey = (tr.top + tr.height / 2 - wrap.top - state.canvas.y) / state.canvas.scale;

    const dx = Math.abs(ex - sx) * .55;
    const d = `M${sx},${sy} C${sx - dx},${sy} ${ex + dx},${ey} ${ex},${ey}`;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'connection-path' + (state.selectedConn === conn.id ? ' selected' : ''));
    path.setAttribute('marker-end', state.selectedConn === conn.id ? 'url(#arr-sel)' : 'url(#arr)');
    path.dataset.connId = conn.id;
    path.addEventListener('click', e => { state.selectedConn = conn.id; renderConnections(); e.stopPropagation(); });
    path.addEventListener('dblclick', () => {
      state.connections = state.connections.filter(c => c.id !== conn.id);
      state.selectedConn = null;
      renderConnections();
      addLog('warn', 'تم حذف الاتصال');
    });
    svg.appendChild(path);
  });
}

// ─── NODE DRAGGING ────────────────────────────────
function startDragNode(e, id) {
  if (e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();

  if (!e.shiftKey && !state.selectedNodes.has(id)) {
    state.selectedNodes.clear();
    state.selectedNodes.add(id);
    renderNodes();
  } else if (e.shiftKey) {
    state.selectedNodes.add(id);
    renderNodes();
  }

  const startPositions = {};
  state.selectedNodes.forEach(nid => {
    const n = state.nodes[nid];
    if (n) startPositions[nid] = { x: n.x, y: n.y };
  });

  const startX = e.clientX, startY = e.clientY;

  function onMove(me) {
    const dx = (me.clientX - startX) / state.canvas.scale;
    const dy = (me.clientY - startY) / state.canvas.scale;
    state.selectedNodes.forEach(nid => {
      if (startPositions[nid] && state.nodes[nid]) {
        state.nodes[nid].x = Math.round(startPositions[nid].x + dx);
        state.nodes[nid].y = Math.round(startPositions[nid].y + dy);
        const el = document.getElementById('node-' + nid);
        if (el) { el.style.left = state.nodes[nid].x + 'px'; el.style.top = state.nodes[nid].y + 'px'; }
      }
    });
    renderConnections();
    updateMinimap();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// ─── CANVAS PAN & ZOOM ────────────────────────────
function setupCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  applyTransform();

  // Pan
  wrap.addEventListener('mousedown', e => {
    if (e.button === 1 || (e.button === 0 && e.target === wrap)) {
      if (e.button === 0) {
        // Selection box
        startSelBox(e);
        return;
      }
      state.panning = true;
      state.panStart = { x: e.clientX - state.canvas.x, y: e.clientY - state.canvas.y };
      wrap.style.cursor = 'grabbing';
    }
  });

  document.addEventListener('mousedown', e => {
    if (e.button === 1) {
      e.preventDefault();
      state.panning = true;
      state.panStart = { x: e.clientX - state.canvas.x, y: e.clientY - state.canvas.y };
      document.getElementById('canvas-wrap').style.cursor = 'grabbing';
    }
  });

  document.addEventListener('mousemove', e => {
    if (state.panning && state.panStart) {
      state.canvas.x = e.clientX - state.panStart.x;
      state.canvas.y = e.clientY - state.panStart.y;
      applyTransform();
      updateMinimap();
    }
    if (state.connecting) updateTempLine(e);
    if (state.selBox) updateSelBox(e);
  });

  document.addEventListener('mouseup', e => {
    if (state.panning) {
      state.panning = false;
      document.getElementById('canvas-wrap').style.cursor = '';
    }
    if (state.connecting) endConnect(e);
    if (state.selBox) endSelBox(e);
  });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.88 : 1.13;
    const rect = wrap.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    state.canvas.x = mx - (mx - state.canvas.x) * delta;
    state.canvas.y = my - (my - state.canvas.y) * delta;
    state.canvas.scale = Math.min(2.5, Math.max(0.2, state.canvas.scale * delta));
    applyTransform();
    renderConnections();
    updateMinimap();
    updateZoomLabel();
  }, { passive: false });

  // Click on empty
  wrap.addEventListener('click', e => {
    if (e.target === wrap || e.target.id === 'canvas') {
      state.selectedNodes.clear();
      state.selectedConn = null;
      renderNodes();
      renderConnections();
      closeProps();
    }
  });
}

function applyTransform() {
  const c = document.getElementById('canvas');
  c.style.transform = `translate(${state.canvas.x}px,${state.canvas.y}px) scale(${state.canvas.scale})`;
}

function zoom(factor) {
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const cx = r.width / 2, cy = r.height / 2;
  state.canvas.x = cx - (cx - state.canvas.x) * factor;
  state.canvas.y = cy - (cy - state.canvas.y) * factor;
  state.canvas.scale = Math.min(2.5, Math.max(0.2, state.canvas.scale * factor));
  applyTransform();
  renderConnections();
  updateMinimap();
  updateZoomLabel();
}

function resetView() {
  state.canvas = { x: 80, y: 60, scale: 1 };
  applyTransform();
  renderConnections();
  updateMinimap();
  updateZoomLabel();
}

function updateZoomLabel() {
  document.getElementById('zoom-label').textContent = Math.round(state.canvas.scale * 100) + '%';
}

// ─── SELECTION BOX ────────────────────────────────
let selStart = null;
function startSelBox(e) {
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  selStart = { x: e.clientX - r.left, y: e.clientY - r.top };
  state.selBox = true;
  const box = document.getElementById('sel-box');
  box.style.display = 'block';
  box.style.left = selStart.x + 'px';
  box.style.top = selStart.y + 'px';
  box.style.width = '0';
  box.style.height = '0';
}
function updateSelBox(e) {
  if (!selStart) return;
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const cx = e.clientX - r.left, cy = e.clientY - r.top;
  const box = document.getElementById('sel-box');
  box.style.left = Math.min(cx, selStart.x) + 'px';
  box.style.top = Math.min(cy, selStart.y) + 'px';
  box.style.width = Math.abs(cx - selStart.x) + 'px';
  box.style.height = Math.abs(cy - selStart.y) + 'px';
}
function endSelBox(e) {
  state.selBox = false;
  const box = document.getElementById('sel-box');
  box.style.display = 'none';
  if (!selStart) return;
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const cx = e.clientX - r.left, cy = e.clientY - r.top;
  const rx1 = (Math.min(cx, selStart.x) - state.canvas.x) / state.canvas.scale;
  const ry1 = (Math.min(cy, selStart.y) - state.canvas.y) / state.canvas.scale;
  const rx2 = (Math.max(cx, selStart.x) - state.canvas.x) / state.canvas.scale;
  const ry2 = (Math.max(cy, selStart.y) - state.canvas.y) / state.canvas.scale;
  if (Math.abs(cx - selStart.x) > 5 || Math.abs(cy - selStart.y) > 5) {
    state.selectedNodes.clear();
    Object.values(state.nodes).forEach(n => {
      if (n.x >= rx1 && n.x + 220 <= rx2 && n.y >= ry1 && n.y + 80 <= ry2)
        state.selectedNodes.add(n.id);
    });
    renderNodes();
  }
  selStart = null;
}

function selectAll() {
  Object.keys(state.nodes).forEach(id => state.selectedNodes.add(id));
  renderNodes();
}

// ─── CONNECTING ───────────────────────────────────
function startConnect(e, nodeId, dir, portIndex) {
  e.preventDefault();
  e.stopPropagation();
  if (dir === 'output') {
    const port = e.target;
    const r = port.getBoundingClientRect();
    const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
    state.connecting = {
      nodeId,
      portIndex,
      sx: (r.left + r.width / 2 - wrap.left - state.canvas.x) / state.canvas.scale,
      sy: (r.top + r.height / 2 - wrap.top - state.canvas.y) / state.canvas.scale,
    };
  } else {
    // Connecting to input: find the connection and allow removal
    const existing = state.connections.find(c => c.to === nodeId && c.toPort === portIndex);
    if (existing) {
      state.connections = state.connections.filter(c => c !== existing);
      renderAll();
    }
  }
}

function updateTempLine(e) {
  if (!state.connecting) return;
  const wrap = document.getElementById('canvas-wrap').getBoundingClientRect();
  const ex = (e.clientX - wrap.left - state.canvas.x) / state.canvas.scale;
  const ey = (e.clientY - wrap.top - state.canvas.y) / state.canvas.scale;
  const { sx, sy } = state.connecting;
  const dx = Math.abs(ex - sx) * .55;
  const d = `M${sx},${sy} C${sx - dx},${sy} ${ex + dx},${ey} ${ex},${ey}`;
  document.getElementById('temp-path').setAttribute('d', d);
}

function endConnect(e) {
  if (!state.connecting) return;
  document.getElementById('temp-path').setAttribute('d', '');
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el && el.classList.contains('port') && el.dataset.dir === 'input') {
    const toNode = el.dataset.node;
    const toPort = parseInt(el.dataset.index);
    if (toNode !== state.connecting.nodeId) {
      addConnection(state.connecting.nodeId, state.connecting.portIndex, toNode, toPort);
      renderAll();
      addLog('info', 'تم إنشاء اتصال جديد');
    }
  }
  state.connecting = null;
}

function handleCanvasDrop(e) {
  const type = e.dataTransfer.getData('nodeType') || dragType;
  if (!type || !NODE_DEFS[type]) return;

  const x = (e.clientX - wrap.left - state.canvas.x) / state.canvas.scale - 110;

// ─── PROPERTIES PANEL ─────────────────────────────
function showProps(id) {
  const node = state.nodes[id];
  if (!node) return;
  const def = NODE_DEFS[node.type];
  const panel = document.getElementById('props-panel');
  panel.classList.add('open');
  document.getElementById('props-title').textContent = node.label;

  let html = `
    <div class="prop-group">
      <div class="prop-group-title">معلومات العقدة</div>
      <div class="prop-field">
        <label class="prop-label">الاسم</label>
        <input class="prop-input" value="${node.label}"
          onchange="state.nodes['${id}'].label=this.value;renderNodes();" />
      </div>
    </div>
    <div class="prop-group">
      <div class="prop-group-title">الإعدادات</div>`;

  (def.fields || []).forEach(field => {
    const val = node.data[field.key] !== undefined ? node.data[field.key] : field.default;
    html += `<div class="prop-field"><label class="prop-label">${field.label}</label>`;

    if (field.type === 'select') {
      html += `<select class="prop-select" onchange="state.nodes['${id}'].data['${field.key}']=this.value">
        ${field.options.map(o => `<option value="${o}" ${val === o ? 'selected' : ''}>${o}</option>`).join('')}
      </select>`;
    } else if (field.type === 'textarea') {
      html += `<textarea class="prop-textarea" onchange="state.nodes['${id}'].data['${field.key}']=this.value">${escHtml(val)}</textarea>`;
    } else if (field.type === 'code') {
      html += `<textarea class="code-editor" onchange="state.nodes['${id}'].data['${field.key}']=this.value">${escHtml(val)}</textarea>`;
    } else if (field.type === 'toggle') {
      html += `<div class="toggle-row"><span class="toggle-label">تفعيل</span>
        <div class="toggle ${val ? 'on' : ''}" onclick="this.classList.toggle('on');state.nodes['${id}'].data['${field.key}']=this.classList.contains('on')"></div>
      </div>`;
    } else {
      html += `<input class="prop-input" type="${field.type || 'text'}" value="${escHtml(val)}"
        onchange="state.nodes['${id}'].data['${field.key}']=this.value" />`;
    }
    html += `</div>`;
  });

  html += `</div>
    <div class="prop-group">

    </div>`;

  document.getElementById('props-body').innerHTML = html;
}

function escHtml(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── RUN FLOW ─────────────────────────────────────
async function runFlow() {
  if (state.runningSimulation) return;
  const nodes = Object.values(state.nodes);
  if (!nodes.length) { showToast('لا توجد عقدات للتشغيل', 'error'); return; }

  state.runningSimulation = true;
  setRunStatus('running', 'جاري التشغيل...');
  addLog('info', '═══ بدء تنفيذ سير العمل ═══');

  // Find trigger nodes (no inputs)
  const triggers = nodes.filter(n => (NODE_DEFS[n.type].inputs || 0) === 0);
  const order = topologicalSort(triggers.map(n => n.id));

  for (const id of order) {
    const node = state.nodes[id];
    if (!node) continue;
    const el = document.getElementById('node-' + id);
    if (el) el.classList.add('running');
    setNodeStatus(id, 'run', 'يعمل...');
    await sleep(400 + Math.random() * 600);
    const ok = Math.random() > 0.1;
    if (el) { el.classList.remove('running'); el.classList.add(ok ? 'success-run' : 'error-run'); }
    setNodeStatus(id, ok ? 'ok' : 'err', ok ? 'نجح ✓' : 'فشل ✗');
    addLog(ok ? 'success' : 'error', `${node.label}: ${ok ? 'تم التنفيذ بنجاح' : 'حدث خطأ'}`);
    if (!ok) break;
  }

  state.runningSimulation = false;
  setRunStatus('done', 'اكتمل التنفيذ ✓');
  addLog('success', '═══ اكتمل تنفيذ سير العمل ═══');
  showToast('اكتمل تنفيذ سير العمل ✓', 'success');

  setTimeout(() => {
    nodes.forEach(n => {
      const el = document.getElementById('node-' + n.id);
      if (el) { el.classList.remove('success-run', 'error-run'); }
      setNodeStatus(n.id, '', 'جاهز');
    });
    setRunStatus('', 'جاهز');
  }, 4000);
}

function topologicalSort(starts) {
  const visited = new Set();
  const order = [];
  function visit(id) {
    if (visited.has(id)) return;
    visited.add(id);
    order.push(id);
    const outConns = state.connections.filter(c => c.from === id);
    outConns.forEach(c => visit(c.to));
  }
  starts.forEach(id => visit(id));
  // Also add any unreached nodes
  Object.keys(state.nodes).forEach(id => { if (!visited.has(id)) { visited.add(id); order.push(id); } });
  return order;
}

function setRunStatus(type, text) {
  const dot = document.getElementById('run-dot');
  const label = document.getElementById('run-status-text');
  dot.className = 'run-dot ' + type;
  label.textContent = text;
}

// ─── AUTO LAYOUT ──────────────────────────────────
function autoLayout() {
  const nodes = Object.values(state.nodes);
  if (!nodes.length) return;

  // Simple left-to-right layered layout
  const layers = {};
  const triggers = nodes.filter(n => (NODE_DEFS[n.type].inputs || 0) === 0);
  function assignLayer(id, layer) {
    if (layers[id] !== undefined) return;
    layers[id] = layer;
    state.connections.filter(c => c.from === id).forEach(c => assignLayer(c.to, layer + 1));
  }
  triggers.forEach(n => assignLayer(n.id, 0));
  nodes.forEach(n => { if (layers[n.id] === undefined) layers[n.id] = 0; });

  const byLayer = {};
  nodes.forEach(n => {
    const l = layers[n.id] || 0;
    if (!byLayer[l]) byLayer[l] = [];
    byLayer[l].push(n.id);
  });

  Object.entries(byLayer).forEach(([layer, ids]) => {
    ids.forEach((id, i) => {
      state.nodes[id].x = 100 + parseInt(layer) * 280;
      state.nodes[id].y = 100 + i * 110;
    });
  });

  renderAll();
  addLog('info', 'تم الترتيب التلقائي');
  showToast('تم الترتيب التلقائي ✓', 'success');
}

function importFlow() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,.tadflow.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        state.nodes = data.nodes || {};
        state.connections = data.connections || [];
        document.getElementById('flow-name').value = data.name || 'سير عمل مستورد';
        renderAll();
        updateEmptyState();
        addLog('success', `تم استيراد "${data.name}"`);
        showToast('تم الاستيراد بنجاح ✓', 'success');
      } catch { showToast('ملف غير صالح ✗', 'error'); }

    reader.readAsText(file);

}

// ─── MINIMAP ──────────────────────────────────────
function updateMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  const W = 180, H = 110;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0f1217';
  ctx.fillRect(0, 0, W, H);

  const nodes = Object.values(state.nodes);
  if (!nodes.length) return;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + 220); maxY = Math.max(maxY, n.y + 80);
  });

  const pad = 12;
  const scaleX = (W - pad * 2) / (maxX - minX || 1);
  const scaleY = (H - pad * 2) / (maxY - minY || 1);
  const s = Math.min(scaleX, scaleY, 0.15);

  // Draw connections
  ctx.strokeStyle = '#3b82f650';
  ctx.lineWidth = 1;
  state.connections.forEach(c => {
    const fn = state.nodes[c.from], tn = state.nodes[c.to];
    if (!fn || !tn) return;
    ctx.beginPath();
    ctx.moveTo(pad + (fn.x + 0 - minX) * s, pad + (fn.y + 35 - minY) * s);
    ctx.lineTo(pad + (tn.x + 220 - minX) * s, pad + (tn.y + 35 - minY) * s);
    ctx.stroke();
  });

  // Draw nodes
  nodes.forEach(n => {
    const def = NODE_DEFS[n.type];
    ctx.fillStyle = def.color + '99';
    const x = pad + (n.x - minX) * s;
    const y = pad + (n.y - minY) * s;
    const w = 220 * s, h = 70 * s;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 2);
    ctx.fill();
  });

  // Viewport indicator
  const wrap = document.getElementById('canvas-wrap');
  const r = wrap.getBoundingClientRect();
  const vx = pad + (-state.canvas.x / state.canvas.scale - minX) * s;
  const vy = pad + (-state.canvas.y / state.canvas.scale - minY) * s;
  const vw = (r.width / state.canvas.scale) * s;
  const vh = (r.height / state.canvas.scale) * s;
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(vx, vy, vw, vh);
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveFlow(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { /* TODO: undo */ }
  if ((e.ctrlKey || e.metaKey) && e.key === 'a') { e.preventDefault(); selectAll(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    if (state.selectedNodes.size === 1) {
      const id = [...state.selectedNodes][0];
      state.clipboard = { type: state.nodes[id].type, data: { ...state.nodes[id].data } };
      showToast('تم النسخ', 'success');
    }
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (state.selectedNodes.size > 0) {
      state.selectedNodes.forEach(id => deleteNode(id));
    } else if (state.selectedConn) {
      state.connections = state.connections.filter(c => c.id !== state.selectedConn);
      state.selectedConn = null;
      renderConnections();
    }
  }
  if (e.key === 'Escape') {
    state.selectedNodes.clear();
    state.connecting = null;
    document.getElementById('temp-path').setAttribute('d', '');
    renderNodes();
    closeProps();
  }
  if (e.key === '+' || e.key === '=') zoom(1.1);
  if (e.key === '-') zoom(0.9);
  if (e.key === '0') resetView();
});
</script>
</body>
</html>
