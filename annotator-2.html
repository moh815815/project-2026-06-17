<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أداة الشرح التفاعلي</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--panel:#1a1d27;--border:#2a2d3e;--accent:#6c63ff;--text:#e8eaf0;--muted:#7b7f9e;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOOLBAR */
#toolbar{background:var(--panel);border-bottom:1px solid var(--border);padding:5px 8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;z-index:100}
.tsec{display:flex;align-items:center;gap:4px;padding:0 6px;border-left:1px solid var(--border)}
.tsec:first-child{border-left:none}
.lbl{font-size:10px;color:var(--muted);white-space:nowrap}
.tbtn{background:transparent;border:1.5px solid var(--border);color:var(--muted);padding:4px 8px;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;gap:3px;transition:all .15s;white-space:nowrap}
.tbtn:hover{border-color:var(--accent);color:var(--text)}
.tbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tbtn.danger{border-color:var(--red);color:var(--red)}
.tbtn.danger:hover{background:var(--red);color:#fff}
.cdot{width:14px;height:14px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .15s;flex-shrink:0}
.cdot:hover,.cdot.sel{transform:scale(1.35);border-color:#fff}
#szslider{-webkit-appearance:none;width:60px;height:4px;background:var(--border);border-radius:4px;outline:none;cursor:pointer}
#szslider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%}
#urlinput{background:var(--bg);border:1.5px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;width:160px;direction:ltr}
#urlinput:focus{outline:none;border-color:var(--accent)}

/* MAIN */
#main{flex:1;position:relative;overflow:hidden;background:#0d0f18}
#imgcon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#bgimg{max-width:100%;max-height:100%;object-fit:contain;user-select:none;pointer-events:none;display:none}
#siteframe{width:100%;height:100%;border:none;display:none;pointer-events:none}

/* VIDEO */
#bgvideo{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none;background:#000;z-index:1}
#bgaudio{display:none}
#videocontrols{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:10px 14px 8px;z-index:15;display:none;flex-direction:column;gap:6px}
#videocontrols.show{display:flex}
#progbar{width:100%;height:5px;background:rgba(255,255,255,.2);border-radius:3px;cursor:pointer;position:relative}
#progfill{height:100%;background:var(--accent);border-radius:3px;width:0%;transition:width .1s linear;pointer-events:none}
#progthumb{position:absolute;top:-4px;width:13px;height:13px;background:#fff;border-radius:50%;margin-right:-6px;right:0%;cursor:pointer;display:none}
.vcrow{display:flex;align-items:center;gap:10px}
.vcbtn{background:rgba(255,255,255,.12);border:none;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;transition:background .15s}
.vcbtn:hover{background:rgba(108,99,255,.6)}
#vtimedisp{color:#ccc;font-size:11px;direction:ltr;font-family:monospace}
#volslider{-webkit-appearance:none;width:70px;height:3px;background:rgba(255,255,255,.3);border-radius:3px;outline:none;cursor:pointer}
#volslider::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;background:#fff;border-radius:50%}
#speedsel{background:rgba(255,255,255,.1);border:none;color:#fff;padding:3px 6px;border-radius:5px;font-size:11px;cursor:pointer}
#speedsel option{background:#1a1d27;color:#fff}

/* WAVEFORM for audio */
#wavecon{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1117,#1a1d27);z-index:1}
#wavecon.show{display:flex}
#wavecanvas{width:100%;height:120px}
#waveinfo{color:var(--muted);font-size:13px;margin-top:10px}

/* SVG overlay */
#annsvg{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;z-index:10}

/* DROP ZONE */
#dropzone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);z-index:5;pointer-events:none}
#dropzone.hidden{display:none}
.bigico{font-size:48px;opacity:.3}
#dropbtns{display:flex;gap:10px;pointer-events:all;margin-top:8px}
.dropbtn{background:var(--panel);border:1.5px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s}
.dropbtn:hover{border-color:var(--accent);background:rgba(108,99,255,.1)}

/* POPUPS */
#lpopup{position:fixed;background:var(--panel);border:1.5px solid var(--accent);border-radius:10px;padding:12px;display:none;z-index:9999;flex-direction:column;gap:8px;min-width:230px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#lpopup.show{display:flex}
#linput{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:14px;direction:rtl}
#linput:focus{outline:none;border-color:var(--accent)}

/* PRESENTATION */
#presoverlay{position:fixed;inset:0;background:#000;z-index:5000;display:none;flex-direction:column;align-items:center;justify-content:center}
#presoverlay.show{display:flex}
#prescanvas{max-width:100vw;max-height:82vh}
#presnav{position:absolute;bottom:16px;display:flex;gap:14px;align-items:center}
#presnav button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px}
#presnav button:hover{background:rgba(108,99,255,.6)}
#prescounter{position:absolute;top:14px;right:18px;color:#aaa;font-size:12px}

/* TEMPLATES */
#tmplpanel{position:fixed;top:55px;right:10px;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:12px;z-index:8000;display:none;flex-direction:column;gap:7px;min-width:195px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#tmplpanel.show{display:flex}
#tmplpanel h4{font-size:12px;color:var(--muted);margin-bottom:2px}
.tmpl-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:7px;cursor:pointer;font-size:12px;text-align:right;transition:all .15s}
.tmpl-btn:hover{border-color:var(--accent);background:rgba(108,99,255,.1)}

/* RECORD */
#recind{position:absolute;top:10px;right:10px;width:11px;height:11px;background:#ef4444;border-radius:50%;display:none;z-index:50;animation:blink 1s infinite}
#recind.show{display:block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#rectimer{position:absolute;top:8px;right:28px;background:rgba(239,68,68,.9);color:#fff;padding:2px 9px;border-radius:10px;font-size:11px;display:none;z-index:50}
#rectimer.show{display:block}

/* MODE LABEL */
#modelbl{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(108,99,255,.85);color:#fff;padding:3px 13px;border-radius:16px;font-size:11px;pointer-events:none;z-index:20;opacity:0;transition:opacity .3s}
#modelbl.show{opacity:1}
.ann-group{cursor:pointer}
.ann-del{opacity:0;transition:opacity .2s;cursor:pointer}
.ann-group:hover .ann-del{opacity:1}

/* TIMED ANNOTATIONS badge */
.timed-badge{position:absolute;background:var(--accent);color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;pointer-events:none;z-index:30;white-space:nowrap;opacity:0;transition:opacity .3s;top:8px;left:8px}
.timed-badge.show{opacity:1}
</style>
</head>
<body>

<div id="toolbar">
  <!-- Load -->
  <div class="tsec">
    <button class="tbtn" onclick="document.getElementById('fileinput').click()">📁 صورة</button>
    <button class="tbtn" onclick="document.getElementById('vidinput').click()">🎬 فيديو</button>
    <button class="tbtn" onclick="document.getElementById('audinput').click()">🎵 صوت</button>
    <input id="urlinput" type="text" placeholder="https://..." dir="ltr">
    <button class="tbtn" onclick="loadURL()">🌐 موقع</button>
    <input type="file" id="fileinput" accept="image/*"       style="display:none" onchange="loadImg(this)">
    <input type="file" id="vidinput" accept="video/*"        style="display:none" onchange="loadVideo(this)">
    <input type="file" id="audinput" accept="audio/*"        style="display:none" onchange="loadAudio(this)">
  </div>
  <!-- Tools -->
  <div class="tsec">
    <span class="lbl">أدوات</span>
    <button class="tbtn active" id="t-arrow"     onclick="setTool('arrow')">➤ سهم</button>
    <button class="tbtn"        id="t-underline" onclick="setTool('underline')">▬ خط</button>
    <button class="tbtn"        id="t-highlight" onclick="setTool('highlight')">🖊 ظلل</button>
    <button class="tbtn"        id="t-rect"      onclick="setTool('rect')">⬜ مستطيل</button>
    <button class="tbtn"        id="t-circle"    onclick="setTool('circle')">⭕ دائرة</button>
    <button class="tbtn"        id="t-text"      onclick="setTool('text')">💬 نص</button>
    <button class="tbtn"        id="t-draw"      onclick="setTool('draw')">✏️ رسم</button>
  </div>
  <!-- Colors -->
  <div class="tsec">
    <div class="cdot sel" style="background:#6c63ff" data-c="#6c63ff" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#ff6584" data-c="#ff6584" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#ffd166" data-c="#ffd166" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#43e97b" data-c="#43e97b" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#ef4444" data-c="#ef4444" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#3b82f6" data-c="#3b82f6" onclick="setColor(this)"></div>
    <div class="cdot"     style="background:#fff"    data-c="#ffffff" onclick="setColor(this)"></div>
  </div>
  <!-- Size -->
  <div class="tsec">
    <input type="range" id="szslider" min="1" max="8" value="2" oninput="curSize=+this.value">
  </div>
  <!-- Actions -->
  <div class="tsec">
    <button class="tbtn" onclick="undoLast()">↩</button>
    <button class="tbtn danger" onclick="clearAll()">🗑</button>
    <button class="tbtn" id="timedlbl" style="display:none;background:rgba(108,99,255,.2);border-color:var(--accent);color:var(--accent)" title="الشرح التالي سيرتبط بوقت الفيديو">⏱ مرتبط بالوقت</button>
  </div>
  <!-- Special -->
  <div class="tsec">
    <button class="tbtn" id="aibtn" onclick="autoExplain()"
      style="background:linear-gradient(135deg,#6c63ff,#ff6584);border:none;color:#fff;font-weight:600">🤖 AI</button>
    <button class="tbtn" onclick="toggleTmpl()"
      style="background:linear-gradient(135deg,#ffd166,#ff6584);border:none;color:#000;font-weight:600">📋 قوالب</button>
    <button class="tbtn" id="recbtn" onclick="toggleRecord()"
      style="background:linear-gradient(135deg,#ef4444,#ff6584);border:none;color:#fff;font-weight:600">🎙️ تسجيل</button>
    <button class="tbtn" onclick="startPresentation()"
      style="background:linear-gradient(135deg,#43e97b,#3b82f6);border:none;color:#000;font-weight:600">🎬 عرض</button>
    <button class="tbtn" onclick="exportSVG()"
      style="background:linear-gradient(135deg,#43e97b,#38f9d7);border:none;color:#000;font-weight:600">💾</button>
  </div>
</div>

<div id="main">
  <!-- Drop zone -->
  <div id="dropzone">
    <div class="bigico">🎬</div>
    <p style="font-size:14px">ارفع صورة، فيديو، أو صوت</p>
    <div id="dropbtns">
      <button class="dropbtn" onclick="document.getElementById('fileinput').click()">🖼️ صورة</button>
      <button class="dropbtn" onclick="document.getElementById('vidinput').click()">🎬 فيديو</button>
      <button class="dropbtn" onclick="document.getElementById('audinput').click()">🎵 صوت</button>
    </div>
    <p style="font-size:11px;margin-top:4px">أو اكتب رابط موقع</p>
  </div>

  <!-- Image -->
  <div id="imgcon"><img id="bgimg" alt=""></div>

  <!-- Video -->
  <video id="bgvideo" playsinline></video>
  <audio id="bgaudio"></audio>

  <!-- Audio waveform display -->
  <div id="wavecon">
    <canvas id="wavecanvas" height="120"></canvas>
    <div id="waveinfo">🎵 ملف صوتي</div>
  </div>

  <!-- Website -->
  <iframe id="siteframe" src="" sandbox="allow-same-origin allow-scripts"></iframe>

  <!-- SVG annotations -->
  <svg id="annsvg"
    onmousedown="svgDown(event)" onmousemove="svgMove(event)" onmouseup="svgUp(event)"
    ontouchstart="tStart(event)" ontouchmove="tMove(event)" ontouchend="tEnd(event)">
    <defs id="svgdefs"></defs>
    <g id="annlayer"></g>
    <g id="livelayer"></g>
  </svg>

  <!-- Video controls -->
  <div id="videocontrols">
    <div id="progbar" onmousedown="seekStart(event)" onmousemove="seekDrag(event)" onmouseup="seekEnd(event)" ontouchstart="seekStart(event)" ontouchmove="seekDrag(event)" ontouchend="seekEnd(event)">
      <div id="progfill"></div>
    </div>
    <div class="vcrow">
      <button class="vcbtn" id="playbtn" onclick="togglePlay()">▶ تشغيل</button>
      <button class="vcbtn" onclick="skipVid(-10)">⏪ 10s</button>
      <button class="vcbtn" onclick="skipVid(10)">10s ⏩</button>
      <span id="vtimedisp">0:00 / 0:00</span>
      <span style="flex:1"></span>
      <span style="color:#aaa;font-size:11px">🔊</span>
      <input type="range" id="volslider" min="0" max="1" step=".05" value="1" oninput="setVol(this.value)">
      <select id="speedsel" onchange="setSpeed(this.value)">
        <option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <button class="vcbtn" onclick="addTimedAnn()" title="أضف شرح مرتبط بهذه اللحظة">📌 شرح هنا</button>
    </div>
  </div>

  <div id="modelbl"></div>
  <div id="recind"></div>
  <div id="rectimer">⏺ 0:00</div>
</div>

<!-- Label popup -->
<div id="lpopup">
  <div id="ltime" style="font-size:11px;color:var(--muted);display:none"></div>
  <input id="linput" type="text" placeholder="اكتب الشرح هنا...">
  <div style="display:flex;gap:6px">
    <button class="tbtn active" style="flex:1" onclick="confirmLbl()">✓ تأكيد</button>
    <button class="tbtn" style="flex:1" onclick="cancelLbl()">✕ إلغاء</button>
  </div>
</div>

<!-- Templates panel -->
<div id="tmplpanel">
  <h4>📋 قوالب جاهزة</h4>
  <button class="tmpl-btn" onclick="applyTemplate('ui')">🖥️ واجهة مستخدم</button>
  <button class="tmpl-btn" onclick="applyTemplate('nav')">🧭 شريط تنقل</button>
  <button class="tmpl-btn" onclick="applyTemplate('form')">📝 فورم</button>
  <button class="tmpl-btn" onclick="applyTemplate('dashboard')">📊 داشبورد</button>
  <button class="tmpl-btn" onclick="applyTemplate('mobile')">📱 موبايل</button>
  <button class="tbtn danger" style="margin-top:4px" onclick="toggleTmpl()">✕ إغلاق</button>
</div>

<!-- Presentation overlay -->
<div id="presoverlay">
  <canvas id="prescanvas"></canvas>
  <div id="prescounter"></div>
  <div id="presnav">
    <button onclick="presStep(-1)">◀ السابق</button>
    <span id="preslbl" style="color:#fff;font-size:13px;max-width:280px;text-align:center"></span>
    <button onclick="presStep(1)">التالي ▶</button>
    <button onclick="endPresentation()" style="background:rgba(239,68,68,.5)">✕ إنهاء</button>
  </div>
</div>

<script>
// ============================
// STATE
// ============================
var curTool='arrow',curColor='#6c63ff',curSize=2;
var drawing=false,sx=0,sy=0,fpts=[];
var anns=[],pendShape=null,pendPos={x:0,y:0},pendIsText=false;
var annSvg=document.getElementById('annsvg');
var annLayer=document.getElementById('annlayer');
var liveLayer=document.getElementById('livelayer');
var modeLbl=document.getElementById('modelbl');
var mediaEl=null; // current video or audio element
var mediaType=null; // 'video' | 'audio' | null
var isSeeking=false;
var timedAnnPending=false; // next annotation will be time-stamped

// ============================
// TOOL
// ============================
function setTool(t){
  curTool=t;
  document.querySelectorAll('[id^="t-"]').forEach(function(b){b.classList.remove('active');});
  var el=document.getElementById('t-'+t); if(el) el.classList.add('active');
  var labels={arrow:'➤ سهم',underline:'▬ خط تحت',highlight:'🖊 تظليل',rect:'⬜ مستطيل',circle:'⭕ دائرة',text:'💬 نص',draw:'✏️ رسم حر'};
  modeLbl.textContent=labels[t]||t; modeLbl.classList.add('show');
  clearTimeout(modeLbl._t); modeLbl._t=setTimeout(function(){modeLbl.classList.remove('show');},2000);
}
function setColor(el){ curColor=el.dataset.c; document.querySelectorAll('.cdot').forEach(function(d){d.classList.remove('sel');}); el.classList.add('sel'); }

// ============================
// SVG DRAW
// ============================
function getPos(e){
  var r=annSvg.getBoundingClientRect();
  var src=(e.touches&&e.touches.length>0)?e.touches[0]:(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  if(!src||src.clientX==null) return{x:0,y:0};
  return{x:src.clientX-r.left,y:src.clientY-r.top};
}

function svgDown(e){
  if(e.target.closest&&e.target.closest('.ann-del')) return;
  var p=getPos(e); sx=p.x; sy=p.y; drawing=true; fpts=[[p.x,p.y]];
  if(curTool==='text'){drawing=false; showLPop(p.x,p.y,null,true); return;}
  liveLayer.innerHTML='';
}
function svgMove(e){
  if(!drawing) return; e.preventDefault();
  var p=getPos(e); liveLayer.innerHTML='';
  if(curTool==='draw'){fpts.push([p.x,p.y]); liveLayer.appendChild(mkFree(fpts,curColor,curSize,.7)); return;}
  var s=mkShape(curTool,sx,sy,p.x,p.y,curColor,curSize,.7); if(s) liveLayer.appendChild(s);
}
function svgUp(e){
  if(!drawing) return; drawing=false;
  var p=getPos(e); liveLayer.innerHTML='';
  var dx=Math.abs(p.x-sx),dy=Math.abs(p.y-sy);
  if(dx<3&&dy<3&&curTool!=='text') return;
  if(curTool==='arrow') showLPop(p.x,p.y,{type:'arrow',x1:sx,y1:sy,x2:p.x,y2:p.y,color:curColor,size:curSize});
  else if(curTool==='draw') commit({type:'draw',points:fpts.slice(),color:curColor,size:curSize,label:''});
  else commit({type:curTool,x1:sx,y1:sy,x2:p.x,y2:p.y,color:curColor,size:curSize,label:''});
}
function tStart(e){svgDown(e);} function tMove(e){svgMove(e);} function tEnd(e){svgUp(e);}

// ============================
// SVG HELPERS
// ============================
function ns(tag,attrs){ var el=document.createElementNS('http://www.w3.org/2000/svg',tag); for(var k in attrs) el.setAttribute(k,attrs[k]); return el; }
function ensureMarker(color){
  var id='ah'+color.replace('#',''); if(document.getElementById(id)) return id;
  var defs=document.getElementById('svgdefs');
  var m=ns('marker',{id:id,markerWidth:'10',markerHeight:'7',refX:'9',refY:'3.5',orient:'auto'});
  m.appendChild(ns('polygon',{points:'0 0, 10 3.5, 0 7',fill:color})); defs.appendChild(m); return id;
}
function mkShape(type,x1,y1,x2,y2,color,size,op){
  var g=ns('g',{}); op=op||1;
  if(type==='arrow'){ var mid=ensureMarker(color); g.appendChild(ns('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:color,'stroke-width':size+1,'stroke-linecap':'round','marker-end':'url(#'+mid+')',opacity:op})); }
  else if(type==='underline'){ var uy=Math.max(y1,y2); g.appendChild(ns('line',{x1:Math.min(x1,x2),y1:uy,x2:Math.max(x1,x2),y2:uy,stroke:color,'stroke-width':size+1,'stroke-linecap':'round',opacity:op})); }
  else if(type==='highlight'){ g.appendChild(ns('rect',{x:Math.min(x1,x2),y:Math.min(y1,y2),width:Math.abs(x2-x1),height:Math.max(Math.abs(y2-y1),14),fill:color,opacity:.35,rx:3})); }
  else if(type==='rect'){ g.appendChild(ns('rect',{x:Math.min(x1,x2),y:Math.min(y1,y2),width:Math.abs(x2-x1),height:Math.abs(y2-y1),fill:'none',stroke:color,'stroke-width':size,rx:4,opacity:op})); }
  else if(type==='circle'){ g.appendChild(ns('ellipse',{cx:(x1+x2)/2,cy:(y1+y2)/2,rx:Math.abs(x2-x1)/2,ry:Math.abs(y2-y1)/2,fill:'none',stroke:color,'stroke-width':size,opacity:op})); }
  return g;
}
function mkFree(pts,color,size,op){
  if(pts.length<2) return ns('g',{});
  var d=pts.map(function(p,i){return(i===0?'M':'L')+p[0]+','+p[1];}).join(' ');
  return ns('path',{d:d,fill:'none',stroke:color,'stroke-width':size,'stroke-linecap':'round','stroke-linejoin':'round',opacity:op||1});
}

}
function renderAnn(ann){

  else if(ann.type==='text'){ var tg=mkText(ann.x1,ann.y1,ann.label,ann.color,ann.size); while(tg.firstChild) g.appendChild(tg.firstChild); }
  else{
    var sg=mkShape(ann.type,ann.x1,ann.y1,ann.x2,ann.y2,ann.color,ann.size,1); while(sg.firstChild) g.appendChild(sg.firstChild);
    if(ann.label){ var lx=ann.type==='arrow'?ann.x2+8:(ann.x1+ann.x2)/2; var ly=ann.type==='arrow'?ann.y2-8:Math.min(ann.y1,ann.y2)-8; var lg=mkText(lx,ly,ann.label,ann.color,0); while(lg.firstChild) g.appendChild(lg.firstChild); }

  }
  // delete btn

  if(ann.type==='draw'&&ann.points&&ann.points.length){delx=ann.points[0][0];dely=ann.points[0][1];}

  });

function onTimeUpdate(){

  document.getElementById('vtimedisp').textContent=fmtTime(cur)+' / '+fmtTime(dur);
  checkTimedAnns(cur);
}
function checkTimedAnns(cur){
  if(cur==null) return;
  anns.forEach(function(ann){
    if(ann.ts==null) return;
    var el=document.getElementById(ann.id);
    if(!el) return;
    var diff=Math.abs(ann.ts-cur);

    else { el.style.opacity='0.15'; }
  });
}
function togglePlay(){ if(!mediaEl) return; mediaEl.paused?mediaEl.play():mediaEl.pause(); }

var seekActive=false;
function seekStart(e){ e.preventDefault(); seekActive=true; doSeek(e); }
function seekDrag(e){ e.preventDefault(); if(seekActive) doSeek(e); }
function seekEnd(e){ seekActive=false; }
function doSeek(e){
  if(!mediaEl) return;
  var bar=document.getElementById('progbar');
  var r=bar.getBoundingClientRect();
  var src=(e.touches&&e.touches.length>0)?e.touches[0]:(e.changedTouches&&e.changedTouches.length>0)?e.changedTouches[0]:e;
  if(!src||src.clientX==null) return;
  var pct=1-((src.clientX-r.left)/r.width);
  pct=Math.max(0,Math.min(1,pct));
  mediaEl.currentTime=pct*(mediaEl.duration||0);
}

var presIdx=0,presSnapshots=[];
function captureBase(){
  var main=document.getElementById('main'); var W=main.offsetWidth,H=main.offsetHeight;
  var c=document.createElement('canvas'); c.width=W; c.height=H;
  var ctx=c.getContext('2d'); ctx.fillStyle='#0d0f18'; ctx.fillRect(0,0,W,H);
  var img=document.getElementById('bgimg');
  var vid=document.getElementById('bgvideo');
  var wc=document.getElementById('wavecon');
  if(img&&img.style.display!=='none'&&img.src){
    var iw=img.naturalWidth,ih=img.naturalHeight,scale=Math.min(W/iw,H/ih);
    var dw=iw*scale,dh=ih*scale,dx=(W-dw)/2,dy=(H-dh)/2;
    ctx.drawImage(img,dx,dy,dw,dh);
  } else if(vid&&vid.style.display!=='none'&&vid.src){
    var vw=vid.videoWidth||W,vh=vid.videoHeight||H,vscale=Math.min(W/vw,H/vh);
    var vdw=vw*vscale,vdh=vh*vscale,vdx=(W-vdw)/2,vdy=(H-vdh)/2;
    try{ctx.drawImage(vid,vdx,vdy,vdw,vdh);}catch(e){}
  } else if(wc&&wc.classList.contains('show')){
    ctx.fillStyle='#1a1d27'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#7b7f9e'; ctx.font='16px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(document.getElementById('waveinfo').textContent,W/2,H/2);
  }
  return{c:c,ctx:ctx,W:W,H:H};
}
function drawAnnCtx(ctx,ann){

    ctx.strokeStyle=ann.color; ctx.lineWidth=ann.size+1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(ann.x1,ann.y1); ctx.lineTo(ann.x2,ann.y2); ctx.stroke();
    var angle=Math.atan2(ann.y2-ann.y1,ann.x2-ann.x1);
    ctx.fillStyle=ann.color; ctx.beginPath(); ctx.moveTo(ann.x2,ann.y2);
    ctx.lineTo(ann.x2-12*Math.cos(angle-.4),ann.y2-12*Math.sin(angle-.4));
    ctx.lineTo(ann.x2-12*Math.cos(angle+.4),ann.y2-12*Math.sin(angle+.4));
    ctx.closePath(); ctx.fill();
    if(ann.label) drawLblCtx(ctx,ann.x2+8,ann.y2-8,ann.label,ann.color);
  } else if(ann.type==='underline'){
    var uy=Math.max(ann.y1,ann.y2); ctx.strokeStyle=ann.color; ctx.lineWidth=ann.size+1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(Math.min(ann.x1,ann.x2),uy); ctx.lineTo(Math.max(ann.x1,ann.x2),uy); ctx.stroke();
  } else if(ann.type==='highlight'){
    ctx.fillStyle=ann.color; ctx.globalAlpha=.35;
    ctx.fillRect(Math.min(ann.x1,ann.x2),Math.min(ann.y1,ann.y2),Math.abs(ann.x2-ann.x1),Math.max(Math.abs(ann.y2-ann.y1),14));
    ctx.globalAlpha=1;
  } else if(ann.type==='rect'){
    ctx.strokeStyle=ann.color; ctx.lineWidth=ann.size;
    ctx.strokeRect(Math.min(ann.x1,ann.x2),Math.min(ann.y1,ann.y2),Math.abs(ann.x2-ann.x1),Math.abs(ann.y2-ann.y1));
    if(ann.label) drawLblCtx(ctx,(ann.x1+ann.x2)/2,Math.min(ann.y1,ann.y2)-8,ann.label,ann.color);
  } else if(ann.type==='circle'){
    ctx.strokeStyle=ann.color; ctx.lineWidth=ann.size; ctx.beginPath();
    ctx.ellipse((ann.x1+ann.x2)/2,(ann.y1+ann.y2)/2,Math.abs(ann.x2-ann.x1)/2,Math.abs(ann.y2-ann.y1)/2,0,0,Math.PI*2); ctx.stroke();
  } else if(ann.type==='draw'){
    ctx.strokeStyle=ann.color; ctx.lineWidth=ann.size; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.beginPath();
    ann.points.forEach(function(p,i){i===0?ctx.moveTo(p[0],p[1]):ctx.lineTo(p[0],p[1]);});

}

function getCenter(ann){
  if(ann.type==='draw'&&ann.points.length){ var xs=ann.points.map(function(p){return p[0];}),ys=ann.points.map(function(p){return p[1];}); return{x:(Math.min.apply(null,xs)+Math.max.apply(null,xs))/2,y:(Math.min.apply(null,ys)+Math.max.apply(null,ys))/2}; }

}
function buildSnapshots(){

    var b=captureBase();
    for(var j=0;j<=i;j++) drawAnnCtx(b.ctx,anns[j]);
    presSnapshots.push({c:cloneC(b.c),label:ann.label||(ann.ts!=null?'⏱'+fmtTime(ann.ts):'شرح '+(i+1)),zoom:getCenter(ann)});
  });
}
function startPresentation(){
  if(!anns.length){alert('أضف شروحات أولاً!');return;}
  buildSnapshots(); presIdx=0;
  document.getElementById('presoverlay').classList.add('show'); renderPresStep();
}
function renderPresStep(){
  var snap=presSnapshots[presIdx];
  var canvas=document.getElementById('prescanvas');
  var maxW=window.innerWidth*.92,maxH=window.innerHeight*.8;
  var scale=Math.min(maxW/snap.c.width,maxH/snap.c.height);
  canvas.width=snap.c.width*scale; canvas.height=snap.c.height*scale;
  var ctx=canvas.getContext('2d');
  ctx.drawImage(snap.c,0,0,canvas.width,canvas.height);
  if(snap.zoom&&presIdx>0){
    var zx=snap.zoom.x*scale,zy=snap.zoom.y*scale,zr=70;
    ctx.save(); ctx.shadowColor='rgba(108,99,255,.9)'; ctx.shadowBlur=25;
    ctx.strokeStyle='rgba(108,99,255,.9)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(zx,zy,zr,0,Math.PI*2); ctx.stroke(); ctx.restore();
    // zoom inset
    var iz=2.5,isize=90;
    ctx.save(); ctx.beginPath(); ctx.arc(zx,zy-zr-isize*.5,isize*.5,0,Math.PI*2); ctx.clip();
    ctx.drawImage(snap.c,(snap.zoom.x-isize/iz/2),(snap.zoom.y-isize/iz/2),isize/iz*scale,isize/iz*scale,zx-isize*.5,zy-zr-isize,isize,isize);
    ctx.restore(); ctx.strokeStyle='rgba(108,99,255,.7)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(zx,zy-zr-isize*.5,isize*.5,0,Math.PI*2); ctx.stroke();
  }
  document.getElementById('preslbl').textContent=snap.label;
  document.getElementById('prescounter').textContent=presIdx+' / '+(presSnapshots.length-1);
}
function presStep(dir){ presIdx=Math.max(0,Math.min(presSnapshots.length-1,presIdx+dir)); renderPresStep(); }
function endPresentation(){ document.getElementById('presoverlay').classList.remove('show'); }
document.addEventListener('keydown',function(e){
  if(!document.getElementById('presoverlay').classList.contains('show')) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') presStep(1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') presStep(-1);
  else if(e.key==='Escape') endPresentation();
});

// ============================
// SCREEN RECORDER
// ============================
var mediaRecorder=null,recChunks=[],recStart=null,recTimer=null;
function toggleRecord(){ if(mediaRecorder&&mediaRecorder.state==='recording') stopRecord(); else startRecord(); }
async function startRecord(){
  try{
    var stream;
    try{
      stream=await navigator.mediaDevices.getDisplayMedia({video:{frameRate:30},audio:true});
    }catch(e){
      // fallback: try captureStream on main element
      var main=document.getElementById('main');
      if(main.captureStream) stream=main.captureStream(30);
      else throw new Error('التسجيل غير مدعوم في هذا المتصفح');
    }
    try{ var mic=await navigator.mediaDevices.getUserMedia({audio:true}); mic.getAudioTracks().forEach(function(t){stream.addTrack(t);}); }catch(e){}
    recChunks=[];
    var mimeType='video/webm;codecs=vp9,opus';
    if(!MediaRecorder.isTypeSupported(mimeType)) mimeType='video/webm';
    mediaRecorder=new MediaRecorder(stream,{mimeType:mimeType});
    mediaRecorder.ondataavailable=function(e){if(e.data.size>0) recChunks.push(e.data);};
    mediaRecorder.onstop=saveRec;
    mediaRecorder.start(100);
    recStart=Date.now();
    document.getElementById('recind').classList.add('show');
    document.getElementById('rectimer').classList.add('show');
    document.getElementById('recbtn').textContent='⏹ إيقاف';
    recTimer=setInterval(function(){ var s=Math.floor((Date.now()-recStart)/1000),m=Math.floor(s/60),ss=s%60; document.getElementById('rectimer').textContent='⏺ '+m+':'+(ss<10?'0':'')+ss; },500);
  }catch(err){ alert('لا يمكن التسجيل:\n'+err.message+'\n\nتأكد من السماح بصلاحية الشاشة'); }
}
function stopRecord(){
  if(mediaRecorder){ mediaRecorder.stop(); try{mediaRecorder.stream.getTracks().forEach(function(t){t.stop();});}catch(e){} }
  clearInterval(recTimer);
  document.getElementById('recind').classList.remove('show');
  document.getElementById('rectimer').classList.remove('show');
  document.getElementById('recbtn').textContent='🎙️ تسجيل';
}
function saveRec(){
  var blob=new Blob(recChunks,{type:'video/webm'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url; a.download='شرح-'+Date.now()+'.webm'; a.click();
}

// INIT
setTool('arrow');
